services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: saude_do_lucro
      POSTGRES_USER: saude_do_lucro
      POSTGRES_PASSWORD: saude_do_lucro
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://saude_do_lucro:saude_do_lucro@postgres:5432/saude_do_lucro
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
