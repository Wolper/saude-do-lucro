services:
  postgres:
    image: postgres:16-alpine
    container_name: saude-do-lucro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-saude_do_lucro}
      POSTGRES_USER: ${POSTGRES_USER:-saude_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-saude_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-saude_user} -d ${POSTGRES_DB:-saude_do_lucro}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
