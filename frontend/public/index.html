<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Saúde do Lucro</title>
    <style>
      :root {
        color: #172018;
        background: #f7f4ed;
        font-family: Arial, Helvetica, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
      }

      main {
        align-items: center;
        display: flex;
        min-height: 100vh;
        padding: 48px 24px;
      }

      section {
        margin: 0 auto;
        max-width: 760px;
      }

      .eyebrow {
        color: #327a3d;
        font-size: 0.875rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      h1 {
        font-size: clamp(3rem, 10vw, 6rem);
        line-height: 0.95;
        margin: 16px 0;
      }

      .lead {
        color: #4d5a50;
        font-size: clamp(1.25rem, 3vw, 1.75rem);
        line-height: 1.4;
      }

      .status-card {
        background: #ffffff;
        border: 1px solid #e0dccf;
        border-radius: 24px;
        box-shadow: 0 24px 80px rgb(26 43 28 / 12%);
        display: grid;
        gap: 8px;
        margin-top: 40px;
        padding: 24px;
      }

      .status-card span {
        color: #5d685f;
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <p class="eyebrow">Fundação técnica do MVP</p>
        <h1>Saúde do Lucro</h1>
        <p class="lead">Copiloto de saúde financeira e lucratividade para pequenos negócios de alimentação.</p>
        <div class="status-card">
          <strong>Escopo atual</strong>
          <span>Base web preparada para evoluir sem dashboard real, autenticação ou IA nesta etapa.</span>
        </div>
      </section>
    </main>
  </body>
</html>
